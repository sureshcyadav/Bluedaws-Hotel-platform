<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0c1222"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e4c07a"/>
      <stop offset="100%" stop-color="#b8832e"/>
    </linearGradient>
    <linearGradient id="goldbase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#a07838"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Crown body — 3-point silhouette -->
  <path d="M9 46 L9 26 L20 38 L32 11 L44 38 L55 26 L55 46 Z" fill="url(#gold)"/>

  <!-- Crown base bar -->
  <rect x="9" y="46" width="46" height="8" rx="4" fill="url(#goldbase)"/>

  <!-- Top gem (centre peak) -->
  <circle cx="32" cy="17" r="3.5" fill="#fef9ee"/>
  <circle cx="32" cy="17" r="2"   fill="#fcd97a"/>

  <!-- Side gems (left and right peak tips) -->
  <circle cx="14.5" cy="30" r="2.5" fill="#fef9ee"/>
  <circle cx="14.5" cy="30" r="1.5" fill="#fcd97a"/>
  <circle cx="49.5" cy="30" r="2.5" fill="#fef9ee"/>
  <circle cx="49.5" cy="30" r="1.5" fill="#fcd97a"/>

  <!-- Inner shadow on crown body for depth -->
  <path d="M14 46 L14 35 L22 41 L32 25 L42 41 L50 35 L50 46 Z"
        fill="#0f172a" opacity="0.18"/>

  <!-- Subtle gold shimmer line on crown base -->
  <rect x="9" y="46" width="46" height="1.5" rx="0.75" fill="#e4c07a" opacity="0.6"/>
</svg>
